[job.plur]
cmd = ["go", "test", "./{{target}}"]

[job.rspec]
cmd = ["bin/rspec"]

# changing .plur.toml
[[watch]]
source = "**/*_test.go"
targets = ["{{dir_relative}}"]
jobs = ["plur"]
ignore = [".git/**", "vendor/**"]

[[watch]]
source = "**/*_spec.rb"
jobs = ["rspec"]
ignore = [".git/**", "fixtures/**", "vendor/**"]

[[watch]]
source = "lib/**/*.rb"
targets = ["spec/{{match}}_spec.rb"]
jobs = ["rspec"]
ignore = [".git/**", "fixtures/**", "vendor/**"]
