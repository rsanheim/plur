[job.plur]
cmd = ["go", "test", "./{{target}}"]

[job.build]
cmd = ["bin/rake", "install"]

[job.rspec]
cmd = ["bin/rspec"]

# Go source files -> rebuild plur
[[watch]]
source = "plur/**/*.go"
jobs = ["build"]
ignore = [".git/**", "vendor/**", "**/*_test.go"]

# Go test files -> run tests
[[watch]]
source = "**/*_test.go"
targets = ["{{dir_relative}}"]
jobs = ["plur"]
ignore = [".git/**", "vendor/**"]

[[watch]]
source = "**/*_spec.rb"
jobs = ["rspec"]
ignore = [".git/**", "fixtures/**", "vendor/**"]

[[watch]]
source = "lib/**/*.rb"
targets = ["spec/{{match}}_spec.rb"]
jobs = ["rspec"]
ignore = [".git/**", "fixtures/**", "vendor/**"]
