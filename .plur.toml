[job.plur]
cmd = ["go", "test", "./{{target}}"]

[job.build]
cmd = ["bin/rake", "install"]

[job.rspec]
cmd = ["bin/rspec"]

# Go source files -> rebuild plur and reload
[[watch]]
source = "**/*.go"
jobs = ["build"]
reload = true
ignore = [".git/**", "**/*_test.go", "**/vendor/**"]

# Go test files -> run tests
[[watch]]
source = "**/*_test.go"
targets = ["{{dir_relative}}"]
jobs = ["plur"]
ignore = [".git/**", "vendor/**"]

[[watch]]
source = "**/*_spec.rb"
jobs = ["rspec"]
ignore = [".git/**", "fixtures/**", "vendor/**"]

[[watch]]
source = "lib/**/*.rb"
targets = ["spec/{{match}}_spec.rb"]
jobs = ["rspec"]
ignore = [".git/**", "fixtures/**", "vendor/**"]
