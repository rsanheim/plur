[job.build]
cmd = ["bin/rake", "install"]

[job.rspec]
cmd = ["bin/rspec"]

# Go source files -> rebuild plur and reload
[[watch]]
name = "plur-go-build"
source = "**/*.go"
jobs = ["build"]
no_targets = true
reload = true
ignore = ["**/*_test.go", "vendor/**", "**/vendor/**", "**/testdata/**"]

# Go test files -> run tests
[[watch]]
name = "go-tests"
source = "**/*_test.go"
targets = ["./{{dir_relative}}"]
jobs = ["go-test"]
ignore = ["vendor/**", "**/vendor/**", "**/testdata/**"]
