version: 2.1

orbs:
  ruby: circleci/ruby@2.5.3
  go: circleci/go@3.0.3
  gh: circleci/github-cli@2.7.2

jobs:
  build-and-test-go:
    docker:
      - image: cimg/ruby:3.4.5
    working_directory: ~/project
    resource_class: medium
    environment:
      - VERBOSE=true
    steps:
      - checkout
      - run:
          name: Debug - Show directory structure
          command: |
            pwd
            ls -la
            ls -la plur/
            ls -la plur/lib/plur/ || echo "plur/lib/plur not found"
      - run:
          name: Install Go
          command: |
            wget https://go.dev/dl/go1.25.2.linux-amd64.tar.gz
            sudo tar -C /usr/local -xzf go1.25.2.linux-amd64.tar.gz
            echo 'export PATH=$PATH:/usr/local/go/bin' >> $BASH_ENV
            source $BASH_ENV
            go version
      - ruby/install-deps:
          include-branch-in-cache-key: false
      - run:
          name: Build plur
          command: bin/rake build
      - run:
          name: Verify plur binary
          command: |
            ./plur/plur --version
            ./plur/plur --help
            ./plur/plur doctor
      - run:
          name: Run Go tests
          command: bin/rake test:go
      - persist_to_workspace:
          root: .
          paths:
            - plur/plur

  test-goreleaser:
    docker:
      - image: cimg/go:1.25.2
    resource_class: medium
    working_directory: ~/project
    steps:
      - checkout
      - go/install-goreleaser
      - run:
          name: Verify GoReleaser installation
          command: goreleaser --version
      - run:
          name: Test GoReleaser snapshot build
          working_directory: plur
          command: |
            goreleaser build --snapshot --single-target --clean
      - run:
          name: Test Linux binary
          command: |
            plur/dist/plur_linux_amd64_v1/plur --version
            plur/dist/plur_linux_amd64_v1/plur doctor
      - store_artifacts:
          path: plur/dist
          destination: goreleaser-artifacts

  test-ruby-integration:
    docker:
      - image: cimg/ruby:3.4.5
    resource_class: large
    working_directory: ~/project/
    steps:
      - checkout
      - attach_workspace:
          at: ~/workspace
      - run:
          name: Install plur from workspace (global and local)
          command: |
            sudo cp ~/workspace/plur/plur /usr/local/bin/
            sudo chmod +x /usr/local/bin/plur
            cp ~/workspace/plur/plur ./plur
      - run:
          name: install plur watcher
          command: plur watch install
      - run:
          name: plur doctor
          command: |
            which plur
            ./plur/plur doctor
      - ruby/install-deps:
          include-branch-in-cache-key: false
      - run:
          name: Run ruby linting
          command: |
            bin/rake lint:ruby
      - run:
          name: Run Ruby tests with plur
          command: |
            bin/rake test:default_ruby
      - restore_cache:
          key: v1-fixture-rails-{{ checksum "fixtures/projects/default-rails/Gemfile.lock" }}
      - run:
          name: Setup test_app
          working_directory: fixtures/projects/default-rails
          command: |
            bundle install --path vendor/bundle
            bundle exec rake db:create db:migrate
      - save_cache:
          key: v1-fixture-rails-{{ checksum "fixtures/projects/default-rails/Gemfile.lock" }}
          paths:
            - fixtures/projects/default-rails/vendor/bundle
      - run:
          name: Run test_app specs with plur
          working_directory: fixtures/projects/default-rails
          command: |
            plur -n 2
      - run:
          name: Install turbo_tests
          command: gem install turbo_tests
      - run:
          name: Run all Ruby specs
          command: |
            bin/rake test

  release:
    docker:
      - image: cimg/ruby:3.4.5
    resource_class: medium
    working_directory: ~/project
    steps:
      - checkout
      - go/install:
          version: 1.25.2
      - gh/setup
      - ruby/install-deps:
          include-branch-in-cache-key: false
      - go/install-goreleaser
      - run:
          name: Verify GoReleaser installation
          command: goreleaser --version
      - run:
          name: Configure Git for automated commits
          command: |
            git config user.email "rsanheim@gmail.com"
            git config user.name "Rob Sanheim"
      - run:
          name: Configure Git authentication for pushing
          command: |
            # Switch origin to use HTTPS with GitHub token
            git remote set-url origin https://${GITHUB_TOKEN}@github.com/rsanheim/plur.git

            # Verify the change (token will be masked in output)
            git remote -v
      - run:
          name: Release with GoReleaser
          command: bundle exec script/release v0.10.4-$CIRCLE_BUILD_NUM-test --automated --draft

workflows:
  test-all:
    jobs:
      - build-and-test-go
      - test-goreleaser
      - test-ruby-integration:
          requires:
            - build-and-test-go

  # Test release workflow - runs on test-releases/* branches for validation
  # Production releases are done from main branch via manual script/release
  release:
    jobs:
      - release:
          context: github-releases
          filters:
            tags:
              only: /^v.*/
            branches:
              only: /test-releases.*/
