version: 2.1

parameters:
  alt_resource_class:
    type: string
    default: rsanheim/orbstack-arm64

orbs:
  ruby: circleci/ruby@2.6.0
  go: circleci/go@3.0.3
  gh: circleci/github-cli@2.7.2

jobs:
  build-and-test-go:
    parameters:
      runner_resource_class:
        type: string
        default: medium
    docker:
      - image: cimg/ruby:3.4.7
    working_directory: ~/project
    resource_class: << parameters.runner_resource_class >>
    environment:
      - VERBOSE=true
    steps:
      - checkout
      - run:
          name: Debug - Show directory structure
          command: |
            pwd
            ls -la
            ls -la plur/
            ls -la plur/lib/plur/ || echo "plur/lib/plur not found"
      - go/install:
          version: "1.25.5"
      - ruby/install-deps:
          include-branch-in-cache-key: false
      - run:
          name: Build plur
          command: bin/rake build lint
      - run:
          name: Verify plur binary
          command: |
            ./plur/plur --version
            ./plur/plur --help
            ./plur/plur doctor
      - run:
          name: Run Go tests
          command: bin/rake test:go

  test-goreleaser:
    parameters:
      runner_resource_class:
        type: string
        default: medium
    docker:
      - image: cimg/go:1.25.5
    resource_class: << parameters.runner_resource_class >>
    working_directory: ~/project
    steps:
      - checkout
      - go/install-goreleaser
      - run:
          name: Verify GoReleaser installation
          command: goreleaser --version
      - run:
          name: Test GoReleaser snapshot build
          working_directory: plur
          command: |
            goreleaser build --snapshot --single-target --clean
      - run:
          name: Test Linux binary
          command: |
            arch="$(go env GOARCH)"
            if [ "$arch" = "arm64" ]; then
              bin="plur/dist/plur_linux_arm64_v8.0/plur"
            else
              bin="plur/dist/plur_linux_${arch}_v1/plur"
            fi
            if [ ! -x "$bin" ]; then
              echo "Expected binary not found: $bin"
              echo "Available plur binaries:"
              find plur/dist -maxdepth 3 -type f -name plur -print
              exit 1
            fi
            "$bin" --version
            "$bin" doctor
      - store_artifacts:
          path: plur/dist
          destination: goreleaser-artifacts

  test-go-race:
    parameters:
      runner_resource_class:
        type: string
        default: medium
    docker:
      - image: cimg/go:1.25.5
    resource_class: << parameters.runner_resource_class >>
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Run Go tests with race detection
          working_directory: plur
          command: go test -mod=mod -race ./...

  test-ruby-integration:
    parameters:
      runner_resource_class:
        type: string
        default: medium
    docker:
      - image: cimg/ruby:3.4.7
    resource_class: << parameters.runner_resource_class >>
    working_directory: ~/project/
    steps:
      - checkout
      - go/install:
          version: "1.25.5"
      - go/install-goreleaser
      - run:
          name: Add GOPATH/bin to PATH
          command: echo 'export PATH="$HOME/go/bin:$PATH"' >> "$BASH_ENV"
      - ruby/install-deps:
          include-branch-in-cache-key: false
      - run:
          name: Install plur globally
          command: bin/rake install
      - run:
          name: Install plur watcher
          command: plur watch install
      - run:
          name: plur doctor
          command: |
            which plur
            plur doctor
      - run:
          name: Run ruby linting
          command: |
            bin/rake lint:ruby
      - run:
          name: Run Ruby tests with plur
          command: |
            bin/rake test:default_ruby
      - restore_cache:
          key: v1-fixture-rails-{{ checksum "fixtures/projects/default-rails/Gemfile.lock" }}
      - run:
          name: Setup test_app
          working_directory: fixtures/projects/default-rails
          command: |
            bundle config set --local path vendor/bundle
            bundle install
            bundle exec rake db:create db:migrate
      - save_cache:
          key: v1-fixture-rails-{{ checksum "fixtures/projects/default-rails/Gemfile.lock" }}
          paths:
            - fixtures/projects/default-rails/vendor/bundle
      - run:
          name: Run test_app specs with plur
          working_directory: fixtures/projects/default-rails
          command: plur
      - run:
          name: Install turbo_tests
          command: gem install turbo_tests
      - run:
          name: Run all Ruby specs
          command: |
            bin/rake test

workflows:
  test-all:
    jobs:
      - build-and-test-go
      - test-goreleaser
      - test-go-race
      - test-ruby-integration:
          requires:
            - build-and-test-go

  selfhosted-test:
    jobs:
      - build-and-test-go:
          runner_resource_class: << pipeline.parameters.alt_resource_class >>
      - test-goreleaser:
          runner_resource_class: << pipeline.parameters.alt_resource_class >>
      - test-go-race:
          runner_resource_class: << pipeline.parameters.alt_resource_class >>
      - test-ruby-integration:
          runner_resource_class: << pipeline.parameters.alt_resource_class >>
          requires:
            - build-and-test-go
