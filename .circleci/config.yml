version: 2.1

parameters:
  go_version:
    type: string
    default: "1.25.7"
  ruby_version:
    type: string
    default: "4.0.1"
  alt_resource_class:
    type: string
    default: rsanheim/orbstack-arm64

orbs:
  ruby: circleci/ruby@2.6.0
  go: circleci/go@3.0.3
  gh: circleci/github-cli@2.7.2

jobs:
  build-and-test-go:
    parameters:
      resource_class:
        type: string
        default: medium
    docker:
      - image: cimg/ruby:<< pipeline.parameters.ruby_version >>
    working_directory: ~/project
    resource_class: << parameters.resource_class >>
    environment:
      - VERBOSE=true
    steps:
      - checkout
      - run:
          name: Debug - Show directory structure
          command: |
            pwd
            ls -la
      - go/install:
          version: << pipeline.parameters.go_version >>
      - ruby/install-deps:
          key: "plur-v2"
          include-branch-in-cache-key: false
      - run:
          name: Build plur
          command: bin/rake build lint
      - run:
          name: Verify plur binary
          command: |
            ./plur --version
            ./plur --help
            ./plur doctor
      - run:
          name: Run Go tests
          command: bin/rake test:go

  test-goreleaser:
    parameters:
      resource_class:
        type: string
        default: medium
    docker:
      - image: cimg/go:<< pipeline.parameters.go_version >>
    resource_class: << parameters.resource_class >>
    working_directory: ~/project
    steps:
      - checkout
      - go/install-goreleaser
      - run:
          name: Verify GoReleaser installation
          command: goreleaser --version
      - run:
          name: Test GoReleaser snapshot build
          command: |
            goreleaser build --snapshot --single-target --clean
      - run:
          name: Test Linux binary
          command: |
            arch="$(go env GOARCH)"
            if [ "$arch" = "arm64" ]; then
              bin="dist/plur_linux_arm64_v8.0/plur"
            else
              bin="dist/plur_linux_${arch}_v1/plur"
            fi
            if [ ! -x "$bin" ]; then
              echo "Expected binary not found: $bin"
              echo "Available plur binaries:"
              find dist -maxdepth 3 -type f -name plur -print
              exit 1
            fi
            "$bin" --version
            "$bin" doctor
      - store_artifacts:
          path: dist
          destination: goreleaser-artifacts

  test-go-race:
    parameters:
      resource_class:
        type: string
        default: medium
    docker:
      - image: cimg/go:<< pipeline.parameters.go_version >>
    resource_class: << parameters.resource_class >>
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Run Go tests with race detection
          command: go test -mod=mod -race ./...

  test-ruby-integration:
    parameters:
      resource_class:
        type: string
        default: medium
    docker:
      - image: cimg/ruby:<< pipeline.parameters.ruby_version >>
    resource_class: << parameters.resource_class >>
    working_directory: ~/project/
    steps:
      - checkout
      - go/install:
          version: << pipeline.parameters.go_version >>
      - go/install-goreleaser
      - run:
          name: Add GOPATH/bin to PATH
          command: echo 'export PATH="$HOME/go/bin:$PATH"' >> "$BASH_ENV"
      - run:
          name: Bundle install
          command: bundle install
      - run:
          name: Install plur globally
          command: bin/rake install
      - run:
          name: Install plur watcher
          command: plur watch install
      - run:
          name: plur doctor
          command: |
            which plur
            plur doctor
      - run:
          name: verify ruby/bundler setup
          command: |
            which ruby
            which bundle
            bundle --version
            ruby --version
            bundle check
            bundle exec rspec --version
      - run:
          name: Run ruby linting
          command: |
            bin/rake lint:ruby
      - run:
          name: Run Ruby tests with plur
          command: |
            bin/rake test:default_ruby
      - restore_cache:
          key: v1-fixture-rails-{{ checksum "fixtures/projects/default-rails/Gemfile.lock" }}
      - run:
          name: Setup test_app
          working_directory: fixtures/projects/default-rails
          command: |
            bundle config set --local path vendor/bundle
            bundle install
            bundle exec rake db:create db:migrate
      - save_cache:
          key: v1-fixture-rails-{{ checksum "fixtures/projects/default-rails/Gemfile.lock" }}
          paths:
            - fixtures/projects/default-rails/vendor/bundle
      - run:
          name: Run test_app specs with plur
          working_directory: fixtures/projects/default-rails
          command: plur
      - run:
          name: Install turbo_tests
          command: gem install turbo_tests
      - run:
          name: Run all Ruby specs
          command: |
            bin/rake test

workflows:
  test-all:
    jobs:
      - build-and-test-go:
          matrix:
            parameters:
              resource_class:
                ["medium", << pipeline.parameters.alt_resource_class >>]
      - test-goreleaser:
          matrix:
            parameters:
              resource_class:
                ["medium", << pipeline.parameters.alt_resource_class >>]
      - test-go-race:
          matrix:
            parameters:
              resource_class:
                ["medium", << pipeline.parameters.alt_resource_class >>]
      - test-ruby-integration:
          matrix:
            parameters:
              resource_class:
                ["medium", << pipeline.parameters.alt_resource_class >>]
          requires:
            - build-and-test-go-<< matrix.resource_class >>
