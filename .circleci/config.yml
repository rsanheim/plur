version: 2.1

orbs:
  ruby: circleci/ruby@2.2.0
  go: circleci/go@3.0.2

jobs:
  build-and-test-go:
    executor:
      name: go/default
      tag: "1.21"
    working_directory: ./rux
    steps:
      - checkout
      - go/with-cache:
          key: go-cache-{{ checksum "go.mod" }}
          steps:
            - go/mod-download
            - go/test
      - run:
          name: Verify rux installation
          command: |
            which rux
            rux --help
      - persist_to_workspace:
          root: ~/go/bin
          paths:
            - rux

  test-ruby:
    docker:
      - image: cimg/ruby:3.4.0
    steps:
      - checkout
      - attach_workspace:
          at: ~/go/bin
      - run:
          name: Install rux from workspace
          command: |
            sudo cp ~/go/bin/rux /usr/local/bin/
            rux --help
      - ruby/install-deps:
          app-dir: rux-ruby
      - run:
          name: Run Ruby tests with rux
          working_directory: rux-ruby
          command: |
            rux --workers 2
      - run:
          name: Run benchmarks
          command: |
            ./script/bench ./rux-ruby

  test-integration:
    docker:
      - image: cimg/ruby:3.3.0
    steps:
      - checkout
      - attach_workspace:
          at: ~/go/bin
      - run:
          name: Install rux from workspace
          command: |
            sudo cp ~/go/bin/rux /usr/local/bin/
      - run:
          name: Setup test_app
          working_directory: test_app
          command: |
            bundle install
            bundle exec rake db:create db:migrate
      - run:
          name: Run test_app specs with rux
          working_directory: test_app
          command: |
            rux --workers 2
      - run:
          name: Test parallel_tests reference
          working_directory: parallel_tests
          command: |
            bundle install
            bundle exec rspec

workflows:
  test-all:
    jobs:
      - build-and-test-go
      - test-ruby:
          requires:
            - build-and-test-go
      - test-integration:
          requires:
            - build-and-test-go
