version: 2.1

orbs:
  ruby: circleci/ruby@2.5.3
  go: circleci/go@3.0.2

jobs:
  build-and-test-go:
    docker:
      - image: cimg/ruby:3.4.4
    working_directory: ~/project
    resource_class: medium
    environment:
      - VERBOSE=true
    steps:
      - checkout
      - run: git submodule sync
      - run: git submodule update --init
      - run:
          name: Debug - Show directory structure
          command: |
            pwd
            ls -la
            ls -la rux/
            ls -la rux/lib/rux/ || echo "rux/lib/rux not found"
      - run:
          name: Install Go
          command: |
            wget https://go.dev/dl/go1.24.2.linux-amd64.tar.gz
            sudo tar -C /usr/local -xzf go1.24.2.linux-amd64.tar.gz
            echo 'export PATH=$PATH:/usr/local/go/bin' >> $BASH_ENV
            source $BASH_ENV
            go version

      - ruby/install-deps
      - run:
          name: Download watcher binary for platform
          command: bin/rake deps:watcher
      - run:
          name: Run Go tests
          command: bin/rake test:go
      - run:
          name: Build rux
          command: bin/rake build
      - run:
          name: Verify rux binary
          command: |
            ./rux/rux --version
            ./rux/rux --help
      - persist_to_workspace:
          root: .
          paths:
            - rux/rux

  test-ruby:
    docker:
      - image: cimg/ruby:3.4.4
    resource_class: medium
    working_directory: ~/project/
    steps:
      - checkout
      - attach_workspace:
          at: ~/workspace
      - run:
          name: Install rux from workspace
          command: |
            sudo cp ~/workspace/rux/rux /usr/local/bin/
            sudo chmod +x /usr/local/bin/rux
            rux --help
      - ruby/install-deps
      - run:
          name: Run Ruby tests with rux
          command: |
            bin/rake test:rux_ruby
      # - run:
      #     name: Run benchmarks
      #     command: |
      #       ./script/bench ./rux-ruby

  test-integration:
    docker:
      - image: cimg/ruby:3.4.4
    resource_class: medium
    working_directory: ~/project/
    steps:
      - checkout
      - attach_workspace:
          at: ~/workspace
      - run:
          name: Install rux from workspace
          command: |
            sudo cp ~/workspace/rux/rux /usr/local/bin/
            sudo chmod +x /usr/local/bin/rux
      - run:
          name: Setup test_app
          working_directory: test_fixtures/test_app
          command: |
            bundle install
            bundle exec rake db:create db:migrate
      - run:
          name: Run test_app specs with rux
          working_directory: test_fixtures/test_app
          command: |
            rux -n 2

workflows:
  test-all:
    jobs:
      - build-and-test-go
      - test-ruby:
          requires:
            - build-and-test-go
      - test-integration:
          requires:
            - build-and-test-go
