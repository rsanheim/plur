version: 2.1

orbs:
  ruby: circleci/ruby@2.6.0
  go: circleci/go@3.0.3
  gh: circleci/github-cli@2.7.2

jobs:
  build-and-test-go:
    docker:
      - image: cimg/ruby:3.4.7
    working_directory: ~/project
    resource_class: medium
    environment:
      - VERBOSE=true
    steps:
      - checkout
      - run:
          name: Debug - Show directory structure
          command: |
            pwd
            ls -la
            ls -la plur/
            ls -la plur/lib/plur/ || echo "plur/lib/plur not found"
      - run:
          name: Install Go
          command: |
            wget https://go.dev/dl/go1.25.5.linux-amd64.tar.gz
            sudo tar -C /usr/local -xzf go1.25.5.linux-amd64.tar.gz
            echo 'export PATH=$PATH:/usr/local/go/bin' >> $BASH_ENV
            source $BASH_ENV
            go version
      - ruby/install-deps:
          include-branch-in-cache-key: false
      - run:
          name: Build plur
          command: bin/rake build lint
      - run:
          name: Verify plur binary
          command: |
            ./plur/plur --version
            ./plur/plur --help
            ./plur/plur doctor
      - run:
          name: Run Go tests
          command: bin/rake test:go
      - persist_to_workspace:
          root: .
          paths:
            - plur/plur

  test-goreleaser:
    docker:
      - image: cimg/go:1.25.5
    resource_class: medium
    working_directory: ~/project
    steps:
      - checkout
      - go/install-goreleaser
      - run:
          name: Verify GoReleaser installation
          command: goreleaser --version
      - run:
          name: Test GoReleaser snapshot build
          working_directory: plur
          command: |
            goreleaser build --snapshot --single-target --clean
      - run:
          name: Test Linux binary
          command: |
            plur/dist/plur_linux_amd64_v1/plur --version
            plur/dist/plur_linux_amd64_v1/plur doctor
      - store_artifacts:
          path: plur/dist
          destination: goreleaser-artifacts

  test-go-race:
    docker:
      - image: cimg/go:1.25.5
    resource_class: medium
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Run Go tests with race detection
          working_directory: plur
          command: go test -mod=mod -race ./...

  test-ruby-integration:
    docker:
      - image: cimg/ruby:3.4.7
    resource_class: large
    working_directory: ~/project/
    steps:
      - checkout
      - attach_workspace:
          at: ~/workspace
      - run:
          name: Install plur from workspace (global and local)
          command: |
            sudo cp ~/workspace/plur/plur /usr/local/bin/
            sudo chmod +x /usr/local/bin/plur
            cp ~/workspace/plur/plur ./plur
      - run:
          name: install plur watcher
          command: plur watch install
      - run:
          name: plur doctor
          command: |
            which plur
            ./plur/plur doctor
      - ruby/install-deps:
          include-branch-in-cache-key: false
      - run:
          name: Run ruby linting
          command: |
            bin/rake lint:ruby
      - run:
          name: Run Ruby tests with plur
          command: |
            bin/rake test:default_ruby
      - restore_cache:
          key: v1-fixture-rails-{{ checksum "fixtures/projects/default-rails/Gemfile.lock" }}
      - run:
          name: Setup test_app
          working_directory: fixtures/projects/default-rails
          command: |
            bundle config set --local path vendor/bundle
            bundle install
            bundle exec rake db:create db:migrate
      - save_cache:
          key: v1-fixture-rails-{{ checksum "fixtures/projects/default-rails/Gemfile.lock" }}
          paths:
            - fixtures/projects/default-rails/vendor/bundle
      - run:
          name: Run test_app specs with plur
          working_directory: fixtures/projects/default-rails
          command: |
            plur -n 2
      - run:
          name: Install turbo_tests
          command: gem install turbo_tests
      - run:
          name: Run all Ruby specs
          command: |
            bin/rake test

  test-macos-arm64:
    machine: true
    resource_class: rsanheim/mac-studio
    environment:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - checkout
      - run:
          name: Setup mise environment
          command: |
            eval "$(/opt/homebrew/bin/brew shellenv)"
            eval "$(mise activate bash)"
            echo 'eval "$(/opt/homebrew/bin/brew shellenv)"' >> $BASH_ENV
            echo 'eval "$(mise activate bash)"' >> $BASH_ENV
            echo 'export PATH="/opt/homebrew/bin:$PATH"' >> $BASH_ENV
      - run:
          name: Environment info
          command: |
            uname -a
            sw_vers
            ruby --version
            go version
      - run:
          name: Install dependencies
          command: bundle install
      - run:
          name: Build and lint
          command: bin/rake build lint
      - run:
          name: Verify plur binary
          command: |
            ./plur/plur --version
            ./plur/plur doctor
      - run:
          name: Run Go tests
          command: bin/rake test:go

  test-ruby-integration-macos:
    machine: true
    resource_class: rsanheim/mac-studio
    environment:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - checkout
      - run:
          name: Setup mise environment
          command: |
            eval "$(/opt/homebrew/bin/brew shellenv)"
            eval "$(mise activate bash)"
            echo 'eval "$(/opt/homebrew/bin/brew shellenv)"' >> $BASH_ENV
            echo 'eval "$(mise activate bash)"' >> $BASH_ENV
            echo 'export PATH="/opt/homebrew/bin:$PATH"' >> $BASH_ENV
      - run:
          name: Install dependencies
          command: bundle install
      - run:
          name: Install plur globally
          command: bin/rake install
      - run:
          name: Install plur watcher
          command: plur watch install
      - run:
          name: Verify plur
          command: |
            which plur
            plur --version
            plur doctor
      - run:
          name: Run ruby linting
          command: bin/rake lint:ruby
      - run:
          name: Run Ruby tests with plur
          command: bin/rake test:default_ruby
      - run:
          name: Setup Rails fixture app
          working_directory: fixtures/projects/default-rails
          command: |
            bundle config set --local path vendor/bundle
            bundle install
            bundle exec rake db:create db:migrate
      - run:
          name: Run Rails fixture specs with plur
          working_directory: fixtures/projects/default-rails
          command: plur -n 2
      - run:
          name: Install turbo_tests
          command: gem install turbo_tests
      - run:
          name: Run all Ruby specs
          command: bin/rake test

  test-reference-repos:
    machine: true
    resource_class: rsanheim/mac-studio
    environment:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - checkout
      - run:
          name: Setup mise environment
          command: |
            eval "$(/opt/homebrew/bin/brew shellenv)"
            # Use shims mode for CI (works better with working_directory changes)
            eval "$(mise activate bash --shims)"
            echo 'eval "$(/opt/homebrew/bin/brew shellenv)"' >> $BASH_ENV
            echo 'eval "$(mise activate bash --shims)"' >> $BASH_ENV
            echo 'export PATH="/opt/homebrew/bin:$PATH"' >> $BASH_ENV
            # Add GOPATH/bin for plur binary
            echo 'export PATH="$HOME/go/bin:$PATH"' >> $BASH_ENV
            # Enable reading .ruby-version files and set global fallbacks
            mise settings set idiomatic_version_file true
            # Add node and pnpm for Discourse
            mise use --global ruby@3.4 go@1.25 node@22 pnpm@10
            mise reshim
      - run:
          name: Install dependencies and build plur
          command: |
            bundle install
            bin/rake install
            mise reshim
      - run:
          name: Verify plur and Ruby
          command: |
            ruby --version
            plur --version
            plur doctor
      - run:
          name: Setup PostgreSQL and Redis (for Discourse)
          command: |
            brew list postgresql@17 &>/dev/null || brew install postgresql@17
            brew list redis &>/dev/null || brew install redis
            brew services start postgresql@17
            brew services start redis
            sleep 5
            export PATH="/opt/homebrew/opt/postgresql@17/bin:$PATH"
            # Create superuser only (db:create handles databases)
            psql -U $USER postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='discourse'" | grep -q 1 || createuser -s discourse
      - run:
          name: Print PostgreSQL connection info
          command: |
            export PATH="/opt/homebrew/opt/postgresql@17/bin:$PATH"
            echo ">>> PostgreSQL Status"
            pg_isready
            echo ""
            echo ">>> PostgreSQL Version"
            psql --version
            echo ""
            echo ">>> Connection Info"
            echo "Host: localhost (Unix socket)"
            echo "Port: 5432 (default)"
            echo "User: discourse (superuser)"
            echo ""
            echo ">>> DATABASE_URL format for Rails:"
            echo "DATABASE_URL=postgres://discourse@localhost/discourse_test"
            echo ""
            echo ">>> Existing databases:"
            psql -U $USER -c "\\l" | grep -E "(Name|discourse)" || echo "(none yet)"
            echo ""
            echo ">>> Existing roles:"
            psql -U $USER -c "\\du" | grep discourse || echo "(none yet)"
      - run:
          name: Clone reference repos
          command: |
            # Clear any SSH URL rewriting (base image has this set)
            git config --global --unset-all 'url.ssh://git@github.com.insteadof' 2>/dev/null || true
            mkdir -p ~/reference-repos
            clone_or_fetch() {
              local url=$1 dir=$2
              if [[ -d "$dir/.git" ]]; then
                git -C "$dir" fetch --depth 1 origin && git -C "$dir" reset --hard origin/HEAD
              else
                git clone --depth 1 "$url" "$dir"
              fi
            }
            clone_or_fetch https://github.com/rubocop/rubocop.git ~/reference-repos/rubocop
            clone_or_fetch https://github.com/rspec/rspec.git ~/reference-repos/rspec
            clone_or_fetch https://github.com/discourse/discourse.git ~/reference-repos/discourse
      - run:
          name: Test plur on RuboCop
          working_directory: ~/reference-repos/rubocop
          command: |
            bundle install
            plur spec --dry-run
            plur spec
      - run:
          name: Test plur on Discourse (unit tests only)
          working_directory: ~/reference-repos/discourse
          environment:
            RAILS_ENV: test
            PARALLEL_TEST_PROCESSORS: "2"
          command: |
            export PATH="/opt/homebrew/opt/postgresql@17/bin:$PATH"
            # Verify node/pnpm from mise
            node --version
            pnpm --version
            bundle install
            # Create and migrate main + parallel databases
            bin/rake db:create
            bin/rake parallel:create
            bin/rake db:migrate
            bin/rake parallel:migrate
            # Show what DBs were created
            psql -U discourse -c "\\l" | grep discourse
            # Run with plur (TEST_ENV_NUMBER routes each worker to its own DB)
            plur -n 2 spec/models --dry-run
            plur -n 2 spec/models
      - run:
          name: Test plur on rspec-core
          working_directory: ~/reference-repos/rspec/rspec-core
          command: |
            bundle install
            plur spec --dry-run
            plur spec

workflows:
  test-all:
    jobs:
      - build-and-test-go
      - test-goreleaser
      - test-go-race
      - test-ruby-integration:
          requires:
            - build-and-test-go

  selfhosted-test:
    jobs:
      - test-macos-arm64
      - test-ruby-integration-macos:
          requires:
            - test-macos-arm64
      - test-reference-repos
