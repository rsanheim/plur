version: 2.1

orbs:
  ruby: circleci/ruby@2.2.0
  go: circleci/go@3.0.2

jobs:
  build-and-test-go:
    executor:
      name: go/default
      tag: "1.22"
    working_directory: ~/project/rux
    resource_class: medium
    steps:
      - checkout:
          path: ~/project/
      - run:
          command: pwd
      - run:
          name: List files in current directory
          command: |
            ls -la
      - run:
          name: List files in project directory
          command: ls ~/project/
      - go/with-cache:
          steps:
            - go/mod-download
            - go/test
            - run:
                name: Build rux
                command: |
                  go build -o rux .
      - run:
          name: Verify rux binary
          command: |
            ls -la rux
            ./rux --help
      - persist_to_workspace:
          root: .
          paths:
            - rux

  test-ruby:
    docker:
      - image: cimg/ruby:3.4.4
    resource_class: medium
    working_directory: ~/project/
    steps:
      - checkout
      - attach_workspace:
          at: ~/workspace
      - run:
          name: Install rux from workspace
          command: |
            sudo cp ~/workspace/rux /usr/local/bin/
            sudo chmod +x /usr/local/bin/rux
            rux --help
      - ruby/install-deps:
          app-dir: rux-ruby
      - ruby/install-deps
      - run:
          name: Run Ruby tests with rux
          command: |
            bin/rake test:rux_ruby
      # - run:
      #     name: Run benchmarks
      #     command: |
      #       ./script/bench ./rux-ruby

  test-integration:
    docker:
      - image: cimg/ruby:3.4.4
    resource_class: medium
    working_directory: ~/project/
    steps:
      - checkout
      - attach_workspace:
          at: ~/workspace
      - run:
          name: Install rux from workspace
          command: |
            sudo cp ~/workspace/rux /usr/local/bin/
            sudo chmod +x /usr/local/bin/rux
      - run:
          name: Setup test_app
          working_directory: test_app
          command: |
            bundle install
            bundle exec rake db:create db:migrate
      - run:
          name: Run test_app specs with rux
          working_directory: test_app
          command: |
            rux -n 2
      - run:
          name: Test parallel_tests reference
          working_directory: references/parallel_tests
          command: |
            bundle install
            bundle exec rspec

workflows:
  test-all:
    jobs:
      - build-and-test-go
      - test-ruby:
          requires:
            - build-and-test-go
      - test-integration:
          requires:
            - build-and-test-go
