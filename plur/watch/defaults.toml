# Embedded default configurations for common project types
# These are used when no explicit job/watch configuration is provided

[defaults.ruby.job.rspec]
cmd = ["bundle", "exec", "rspec", "{{target}}"]
target_pattern = "spec/**/*_spec.rb"
watch_dirs = ["spec", "lib", "app"]

[defaults.ruby.job.minitest]
cmd = ["bundle", "exec", "ruby", "-Itest", "{{target}}"]
target_pattern = "test/**/*_test.rb"
watch_dirs = ["test", "lib", "app"]

[defaults.ruby.job.rubocop]
cmd = ["bundle", "exec", "rubocop", "{{target}}"]

# Watch mapping: lib files -> spec files
[[defaults.ruby.watch]]
name = "lib-to-spec"
source = "lib/**/*.rb"
targets = ["spec/{{match}}_spec.rb"]
jobs = "rspec"

# Watch mapping: app files -> spec files
[[defaults.ruby.watch]]
name = "app-to-spec"
source = "app/**/*.rb"
targets = ["spec/{{match}}_spec.rb"]
jobs = "rspec"

# Watch mapping: spec files run themselves
[[defaults.ruby.watch]]
name = "spec-files"
source = "spec/**/*_spec.rb"
jobs = "rspec"

# Watch mapping: lib files -> test files
[[defaults.ruby.watch]]
name = "lib-to-test"
source = "lib/**/*.rb"
targets = ["test/{{match}}_test.rb"]
jobs = "minitest"

# Watch mapping: app files -> test files
[[defaults.ruby.watch]]
name = "app-to-test"
source = "app/**/*.rb"
targets = ["test/{{match}}_test.rb"]
jobs = "minitest"

# Watch mapping: test files run themselves
[[defaults.ruby.watch]]
name = "test-files"
source = "test/**/*_test.rb"
jobs = "minitest"

[defaults.go.job.go-test]
cmd = ["go", "test", "{{target}}"]
target_pattern = "**/*_test.go"

[defaults.go.job.go-lint]
cmd = ["go", "vet", "{{target}}"]

# Watch mapping: Go source files -> package directory
[[defaults.go.watch]]
name = "go-source"
source = "**/*.go"
targets = ["{{dir_relative}}"]
jobs = "go-test"
exclude = ["vendor/**", "**/testdata/**"]

# Watch mapping: Go test files run themselves
[[defaults.go.watch]]
name = "go-tests"
source = "**/*_test.go"
targets = ["{{dir_relative}}"]
jobs = "go-test"
exclude = ["vendor/**"]
