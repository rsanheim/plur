# Embedded default configurations for common project types
# These are used when no explicit job/watch configuration is provided
#
# Structure: defaults.job.<name> for direct --use=<name> lookup

[defaults.job.rspec]
cmd = ["bundle", "exec", "rspec", "{{target}}"]
target_pattern = "spec/**/*_spec.rb"

[defaults.job.minitest]
cmd = ["bundle", "exec", "ruby", "-Itest", "{{target}}"]
target_pattern = "test/**/*_test.rb"

[defaults.job.go-test]
cmd = ["go", "test", "{{target}}"]
target_pattern = "**/*_test.go"

# Watch mappings - jobs field specifies which job to trigger

# Ruby: lib files -> spec files
[[defaults.watch]]
name = "lib-to-spec"
source = "lib/**/*.rb"
targets = ["spec/{{match}}_spec.rb"]
jobs = ["rspec"]

# Ruby: app files -> spec files
[[defaults.watch]]
name = "app-to-spec"
source = "app/**/*.rb"
targets = ["spec/{{match}}_spec.rb"]
jobs = ["rspec"]

# Ruby: spec files run themselves
[[defaults.watch]]
name = "spec-files"
source = "spec/**/*_spec.rb"
jobs = ["rspec"]

# Ruby: lib files -> test files
[[defaults.watch]]
name = "lib-to-test"
source = "lib/**/*.rb"
targets = ["test/{{match}}_test.rb"]
jobs = ["minitest"]

# Ruby: app files -> test files
[[defaults.watch]]
name = "app-to-test"
source = "app/**/*.rb"
targets = ["test/{{match}}_test.rb"]
jobs = ["minitest"]

# Ruby: test files run themselves
[[defaults.watch]]
name = "test-files"
source = "test/**/*_test.rb"
jobs = ["minitest"]

# Go: source files -> package directory
[[defaults.watch]]
name = "go-source"
source = "**/*.go"
targets = ["{{dir_relative}}"]
jobs = ["go-test"]
exclude = ["vendor/**", "**/testdata/**"]

# Go: test files run themselves
[[defaults.watch]]
name = "go-tests"
source = "**/*_test.go"
targets = ["{{dir_relative}}"]
jobs = ["go-test"]
exclude = ["vendor/**"]
