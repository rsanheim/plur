# Example of command-specific configuration for rux
# This demonstrates how to configure different commands with their own settings

# Global settings apply to all commands
workers = 4          # Number of parallel workers
color = true         # Enable colored output
verbose = false      # Global verbosity

# Spec command configuration
# These settings only apply when running `rux spec`
[spec]
command = "rspec"    # Use bare rspec for maximum performance in CI/prod

# Watch command configuration  
# These settings only apply when running `rux watch`
[watch.run]
command = "bundle exec rspec"  # Use bundle exec for compatibility in development
debounce = 200                 # Increase debounce delay for watch mode

# Configuration precedence (highest to lowest):
# 1. CLI flags (e.g., --command="bin/rspec")
# 2. Command-specific config section (e.g., [spec] or [watch.run])
# 3. Global config at top level
# 4. Built-in defaults

# Real-world use case:
# - CI/Production: Use fast bare "rspec" via spec command
# - Development: Use compatible "bundle exec rspec" via watch command
# - This allows optimal performance where it matters most while maintaining
#   compatibility during development