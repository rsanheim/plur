# GoReleaser configuration for plur
# https://goreleaser.com/customization/

version: 2

# Set project name
project_name: plur

# Before hooks - run before building
before:
  hooks:
    - go mod tidy
    - go mod vendor

# Build configuration
builds:
  - id: plur
    main: .
    binary: plur

    # Build for multiple platforms
    goos:
      - darwin
      - linux
      - windows

    goarch:
      - amd64
      - arm64

    # Skip unsupported combinations
    ignore:
      - goos: darwin
        goarch: amd64 # No Intel Mac support
      - goos: windows
        goarch: arm64 # Not supporting Windows ARM64

    # Set module mode
    flags:
      - -mod=vendor

    # Embed version information via ldflags
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

    # Environment variables for build
    # Use inherited CGO_ENABLED if set (for race detection), otherwise default to 0 for static builds
    env:
      - CGO_ENABLED={{ envOrDefault "CGO_ENABLED" "0" }}

# Archive configuration
archives:
  - id: plur-archive
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

    # Use tar.gz for Unix, zip for Windows
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats: ["zip"]
    wrap_in_directory: true

    # Include these files in the archive
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

# Checksum configuration
checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

# Snapshot configuration (for testing)
snapshot:
  version_template: "{{ .Version }}-dev-{{ .ShortCommit }}"

# Release configuration
release:
  mode: replace # Overwrite any existing release body (GitHub may create empty releases on tag push)
  github:
    owner: rsanheim
    name: plur

  # Draft and release notes controlled via CLI flags
  name_template: "v{{.Version}}"

# Changelog configuration
# Auto-generation disabled via --release-notes CLI flag (passing our custom notes file)
# Note: Do NOT use changelog: disable: true as it ignores the --release-notes flag entirely

# Homebrew tap — auto-updates Formula/plur.rb in rsanheim/homebrew-tap on each release
brews:
  - repository:
      owner: rsanheim
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/rsanheim/plur
    description: Fast parallel test runner for Ruby/RSpec
    license: MIT
    install: |
      bin.install "plur"
    test: |
      assert_match version.to_s, shell_output("#{bin}/plur --version")
