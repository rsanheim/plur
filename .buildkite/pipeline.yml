cache:
  paths:
    - ".cache/go-mod"
    - "vendor/bundle"
    - "fixtures/projects/default-rails/vendor/bundle"
  size: "20g"

steps:
  - label: ":go: Build & Test"
    key: "go-tests"
    plugins:
      - docker#v5.13.0:
          image: "ruby:4.0.1"
          workdir: /work
          mount-checkout: true
          volumes:
            - "/cache:/cache"
          environment:
            - "GOMODCACHE=/work/.cache/go-mod"
            - "VERBOSE=true"
            - "CI=true"
    command: ".buildkite/scripts/build-and-test-go.sh"
    timeout_in_minutes: 10

  - label: ":go: Race Detection"
    key: "go-race"
    plugins:
      - docker#v5.13.0:
          image: "golang:1.25.5"
          workdir: /work
          mount-checkout: true
          volumes:
            - "/cache:/cache"
          environment:
            - "GOMODCACHE=/work/.cache/go-mod"
    command: "cd plur && go test -mod=mod -race ./..."
    timeout_in_minutes: 10

  - label: ":go: GoReleaser Snapshot"
    key: "goreleaser"
    plugins:
      - docker#v5.13.0:
          image: "golang:1.25.5"
          workdir: /work
          mount-checkout: true
          volumes:
            - "/cache:/cache"
          environment:
            - "GOMODCACHE=/work/.cache/go-mod"
    command: ".buildkite/scripts/goreleaser.sh"
    artifact_paths: "plur/dist/**/*"
    timeout_in_minutes: 10

  - label: ":ruby: Integration Tests"
    key: "ruby-integration"
    depends_on: "go-tests"
    plugins:
      - docker#v5.13.0:
          image: "ruby:4.0.1"
          workdir: /work
          mount-checkout: true
          volumes:
            - "/cache:/cache"
          environment:
            - "GOMODCACHE=/work/.cache/go-mod"
            - "VERBOSE=true"
            - "CI=true"
    command: ".buildkite/scripts/integration.sh"
    timeout_in_minutes: 20
