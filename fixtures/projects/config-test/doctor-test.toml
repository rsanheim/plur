workers = 4
color = true
use = "doctor-test"

[task.doctor-test]
description = "Custom test task for doctor verification"
run = "echo 'DOCTOR TEST TASK'"
source_dirs = ["spec", "lib"]
test_glob = "spec/**/*_spec.rb"

[[task.doctor-test.mappings]]
pattern = "lib/**/*.rb"
target = "spec/{{path}}/{{name}}_spec.rb"

[[task.doctor-test.mappings]]
pattern = "spec/**/*_spec.rb"
target = "{{file}}"
