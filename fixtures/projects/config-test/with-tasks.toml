# Configuration file with task definitions
workers = 2
color = false

[task.rspec]
description = "Custom RSpec configuration"
run = "bin/rspec --format documentation"
source_dirs = ["spec", "lib", "app"]
test_glob = "spec/**/*_spec.rb"

[task.minitest]
description = "Custom Minitest configuration"
run = "bundle exec ruby -I test"
source_dirs = ["test", "lib", "app"]
test_glob = "test/**/*_test.rb"

[task.custom]
description = "Custom test runner"
run = "echo 'CUSTOM TASK:'"
# Intentionally minimal - should inherit source_dirs, test_glob from auto-detected RSpec
