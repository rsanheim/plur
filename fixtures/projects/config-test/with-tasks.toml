# Configuration file with job definitions
workers = 2
color = false

[job.rspec]
cmd = ["bin/rspec", "--format", "documentation", "{{target}}"]
target_pattern = "spec/**/*_spec.rb"

[job.minitest]
cmd = ["bundle", "exec", "ruby", "-Itest", "{{target}}"]
target_pattern = "test/**/*_test.rb"

[job.custom]
framework = "passthrough"
cmd = ["echo", "CUSTOM TASK:", "{{target}}"]
target_pattern = "spec/**/*_spec.rb"
# Minimal job definition with required target_pattern for plur spec
