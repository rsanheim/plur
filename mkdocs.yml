site_name: Rux Documentation
site_description: Fast parallel test runner for Ruby/RSpec
site_url: https://github.com/rsanheim/rux-meta
repo_name: rsanheim/rux-meta
repo_url: https://github.com/rsanheim/rux-meta

theme:
  name: material
  font:
    text: Lato
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

docs_dir: docs

# Navigation handled by awesome-pages plugin

plugins:
  - search
  - social
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      timezone: America/Chicago
      locale: en
      fallback_to_build_date: false
      exclude:
        - index.md
      enabled: true

validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: info
  links:
    not_found: warn
    anchors: warn
    absolute_links: info
    unrecognized_links: info

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rsanheim/rux-meta
