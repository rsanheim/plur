site_name: Rux Documentation
site_description: Fast parallel test runner for Ruby/RSpec
repo_name: rsanheim/rux-meta
repo_url: https://github.com/rsanheim/rux-meta

theme:
  name: material
  font:
    text: Lato
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

docs_dir: docs

# Optional: Define navigation structure
nav:
  - Home: README.md
  - Project Status: project-status.md
  - Architecture:
      - Performance Tracing: architecture/performance-tracing.md
      - Watch Mode: architecture/rux-watch-architecture.md
      - CLI Context Comparison: architecture/cli-context-comparison.md
      - Concurrent Output Issues: architecture/watch-mode-concurrent-output-issue.md
  - Development:
      - User Guide: development/user-guide.md
      - Go Vendoring and CI: development/go-vendoring-and-ci.md
  - Design:
      - Output and Design: rux-output-and-design.md
      - Optimization Plan: rux-optimization-plan.md
  - Research:
      - Backspin API Analysis: research/backspin-api-analysis.md
      - Backspin Filter vs Match: research/backspin-filter-vs-match-research.md
      - Backspin IO Capture: research/backspin-io-capture-design.md
      - File Mapping Formats: research/file-mapping-config-formats.md
      - Snapshot Testing: research/snapshot-testing-approaches-summary.md
  - Process:
      - Release Process: release-process.md
  - Archive:
      - RSpec Package Extraction: _archive/2025-05-28-rspec-package.md
      - Single Stream Migration: _archive/2025-05-28-single-stream-full-migration.md
      - Watcher Implementation Spike: _archive/2025-06-03-spike-into-adding-watcher.md
      - Multiple Watchers Plan: _archive/2025-06-04-rux-watch-multiple-watchers-plan.md

plugins:
  - search
  - social

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rsanheim/rux-meta
